<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Workspace</title>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --surface-color: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --primary-color: #0d6efd;
            --primary-hover: #0b5ed7;
            --sidebar-width: 260px;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-size: 18px;
            --line-height: 1.6;
            --text-align: left;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333333;
            --primary-color: #6f42c1;
            --primary-hover: #845ef7;
        }

        [data-font="sans"] {
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        [data-font="serif"] {
            --font-family: Georgia, "Times New Roman", serif;
        }

        [data-font="mono"] {
            --font-family: Consolas, "Courier New", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--surface-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 1rem;
        }

        .sidebar-header {
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .doc-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .doc-item {
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            transition: background 0.2s;
        }

        .doc-item:hover,
        .doc-item.active {
            background-color: var(--border-color);
        }

        .doc-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-weight: bold;
            padding: 0 0.25rem;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            gap: 1rem;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .toolbar,
        .formatting-toolbar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
            padding: 0.75rem;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .formatting-toolbar {
            justify-content: flex-start;
        }

        .formatting-label {
            font-weight: bold;
            margin-right: 0.5rem;
        }

        button,
        select {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--surface-color);
            color: var(--text-color);
            cursor: pointer;
            font-family: inherit;
        }

        button.btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
        }

        button.btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .title-input {
            font-size: 2rem;
            font-weight: bold;
            border: none;
            border-bottom: 2px solid transparent;
            background: transparent;
            color: var(--text-color);
            padding: 0.5rem 0;
            width: 100%;
            outline: none;
            font-family: var(--font-family);
        }

        .title-input:focus {
            border-bottom-color: var(--primary-color);
        }

        .writing-canvas {
            flex-grow: 1;
            resize: none;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
            font-size: var(--font-size);
            line-height: var(--line-height);
            text-align: var(--text-align);
            background-color: var(--surface-color);
            color: var(--text-color);
            font-family: var(--font-family);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .writing-canvas:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        }

        .analytics-bar {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
            color: #6c757d;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border-color);
        }

        .metric-value {
            font-weight: bold;
            color: var(--text-color);
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <span>Documents</span>
            <button onclick="createNewDocument()" title="Create new document">+</button>
        </div>

        <ul class="doc-list" id="docList"></ul>

        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <button onclick="exportBackupJSON()">Bulk Backup JSON</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="toolbar">
            <button onclick="toggleTheme()">Toggle Mode</button>
            <button class="btn-primary" onclick="downloadTxtFile()">Download .txt</button>
        </div>

        <!-- Formatting / Police Section -->
        <div class="formatting-toolbar">
            <span class="formatting-label">Formatting / Police:</span>

            <select id="fontSelect" onchange="changeFont(this.value)">
                <option value="sans">Sans-serif</option>
                <option value="serif">Serif</option>
                <option value="mono">Monospace</option>
            </select>

            <select id="fontSizeSelect" onchange="changeFontSize(this.value)">
                <option value="14px">Small</option>
                <option value="18px" selected>Medium</option>
                <option value="22px">Large</option>
                <option value="28px">Extra Large</option>
            </select>

            <select id="alignmentSelect" onchange="changeAlignment(this.value)">
                <option value="left">Left</option>
                <option value="center">Center</option>
                <option value="right">Right</option>
                <option value="justify">Justify</option>
            </select>

            <select id="lineSpacingSelect" onchange="changeLineSpacing(this.value)">
                <option value="1.2">Compact</option>
                <option value="1.6" selected>Normal</option>
                <option value="2">Spacious</option>
            </select>
        </div>

        <input
            type="text"
            id="titleInput"
            class="title-input"
            placeholder="Untitled Document"
            oninput="updateCurrentDocument()"
        >

        <textarea
            id="writingCanvas"
            class="writing-canvas"
            placeholder="Start writing here..."
            oninput="processText()"
        ></textarea>

        <div class="analytics-bar">
            <div>Words: <span id="wordCount" class="metric-value">0</span></div>
            <div>Characters: <span id="charCount" class="metric-value">0</span></div>
        </div>
    </main>

    <script>
        let documents = JSON.parse(localStorage.getItem("narrative_matrix")) || {};
        let activeDocId = localStorage.getItem("active_doc_id") || null;

        window.addEventListener("DOMContentLoaded", () => {
            restorePreferences();

            if (Object.keys(documents).length === 0) {
                createNewDocument("First Document");
            } else {
                renderSidebar();

                if (activeDocId && documents[activeDocId]) {
                    loadDocument(activeDocId);
                } else {
                    loadDocument(Object.keys(documents)[0]);
                }
            }
        });

        function restorePreferences() {
            const savedTheme = localStorage.getItem("theme") || "light";
            const savedFont = localStorage.getItem("font") || "sans";
            const savedFontSize = localStorage.getItem("font_size") || "18px";
            const savedAlignment = localStorage.getItem("text_align") || "left";
            const savedLineSpacing = localStorage.getItem("line_spacing") || "1.6";

            document.body.setAttribute("data-theme", savedTheme);
            document.body.setAttribute("data-font", savedFont);

            document.documentElement.style.setProperty("--font-size", savedFontSize);
            document.documentElement.style.setProperty("--text-align", savedAlignment);
            document.documentElement.style.setProperty("--line-height", savedLineSpacing);

            document.getElementById("fontSelect").value = savedFont;
            document.getElementById("fontSizeSelect").value = savedFontSize;
            document.getElementById("alignmentSelect").value = savedAlignment;
            document.getElementById("lineSpacingSelect").value = savedLineSpacing;
        }

        function createNewDocument(title = "Untitled Document") {
            const id = "doc_" + Date.now();

            documents[id] = {
                id: id,
                title: title,
                content: ""
            };

            saveToStorage();
            renderSidebar();
            loadDocument(id);
        }

        function loadDocument(id) {
            if (!documents[id]) return;

            activeDocId = id;
            localStorage.setItem("active_doc_id", id);

            const doc = documents[id];

            document.getElementById("titleInput").value = doc.title;
            document.getElementById("writingCanvas").value = doc.content;

            renderSidebar();
            processText();
        }

        function updateCurrentDocument() {
            if (!activeDocId || !documents[activeDocId]) return;

            const title = document.getElementById("titleInput").value || "Untitled Document";
            const content = document.getElementById("writingCanvas").value;

            documents[activeDocId].title = title;
            documents[activeDocId].content = content;

            const item = document.querySelector(`[data-id="${activeDocId}"] .doc-title`);

            if (item) {
                item.textContent = title;
            }

            saveToStorage();
        }

        function deleteDocument(id, event) {
            event.stopPropagation();

            if (Object.keys(documents).length <= 1) {
                alert("You must keep at least one document.");
                return;
            }

            delete documents[id];
            saveToStorage();

            if (activeDocId === id) {
                loadDocument(Object.keys(documents)[0]);
            } else {
                renderSidebar();
            }
        }

        function renderSidebar() {
            const list = document.getElementById("docList");
            list.innerHTML = "";

            Object.values(documents).forEach(doc => {
                const li = document.createElement("li");
                li.className = `doc-item ${doc.id === activeDocId ? "active" : ""}`;
                li.setAttribute("data-id", doc.id);
                li.onclick = () => loadDocument(doc.id);

                const titleSpan = document.createElement("span");
                titleSpan.className = "doc-title";
                titleSpan.textContent = doc.title;

                const delBtn = document.createElement("button");
                delBtn.className = "delete-btn";
                delBtn.textContent = "×";
                delBtn.title = "Delete document";
                delBtn.onclick = event => deleteDocument(doc.id, event);

                li.appendChild(titleSpan);
                li.appendChild(delBtn);
                list.appendChild(li);
            });
        }

        function processText() {
            const text = document.getElementById("writingCanvas").value;

            const charCount = text.length;
            const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;

            document.getElementById("charCount").textContent = charCount;
            document.getElementById("wordCount").textContent = wordCount;

            updateCurrentDocument();
        }

        function saveToStorage() {
            localStorage.setItem("narrative_matrix", JSON.stringify(documents));
        }

        function toggleTheme() {
            const currentTheme = document.body.getAttribute("data-theme");
            const targetTheme = currentTheme === "dark" ? "light" : "dark";

            document.body.setAttribute("data-theme", targetTheme);
            localStorage.setItem("theme", targetTheme);
        }

        function changeFont(fontStyle) {
            document.body.setAttribute("data-font", fontStyle);
            localStorage.setItem("font", fontStyle);
        }

        function changeFontSize(size) {
            document.documentElement.style.setProperty("--font-size", size);
            localStorage.setItem("font_size", size);
        }

        function changeAlignment(alignment) {
            document.documentElement.style.setProperty("--text-align", alignment);
            localStorage.setItem("text_align", alignment);
        }

        function changeLineSpacing(spacing) {
            document.documentElement.style.setProperty("--line-height", spacing);
            localStorage.setItem("line_spacing", spacing);
        }

        function downloadTxtFile() {
            const title = document.getElementById("titleInput").value || "Untitled";
            const content = document.getElementById("writingCanvas").value;

            const blob = new Blob([content], {
                type: "text/plain;charset=utf-8"
            });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${title.toLowerCase().replace(/[^a-z0-9]/gi, "_")}.txt`;
            link.click();

            URL.revokeObjectURL(link.href);
        }

        function exportBackupJSON() {
            const dataStr =
                "data:text/json;charset=utf-8," +
                encodeURIComponent(JSON.stringify(documents, null, 2));

            const downloadAnchor = document.createElement("a");
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `narrative_matrix_backup_${Date.now()}.json`);

            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
    </script>
</body>
</html>
