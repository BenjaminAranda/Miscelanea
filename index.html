
<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <meta charset="UTF-8" />
  <title>Narrative Workspace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg-light: #f5f5f7;
      --bg-dark: #111317;
      --text-light: #111317;
      --text-dark: #f5f5f7;
      --accent: #4f46e5;
      --accent-soft: #e0e7ff;
      --border: #d4d4d8;
      --danger: #ef4444;
      --sidebar-width: 260px;
      --radius: 8px;
      --shadow-soft: 0 10px 25px rgba(15, 23, 42, 0.12);
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }

    body {
      margin: 0;
      font-family: var(--font-main);
      background: var(--bg-light);
      color: var(--text-light);
      display: flex;
      min-height: 100vh;
      transition: background 0.2s ease, color 0.2s ease;
    }

    body.dark {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    body.dark .card {
      background: #18181b;
      border-color: #27272a;
      box-shadow: none;
    }

    body.dark .sidebar {
      background: #09090b;
      border-color: #27272a;
    }

    body.dark .input,
    body.dark textarea {
      background: #09090b;
      border-color: #27272a;
      color: var(--text-dark);
    }

    body.dark .stats-row {
      background: #18181b;
      border-color: #27272a;
    }

    body.dark .toc-item.active {
      background: #1d1d20;
    }

    .app {
      display: flex;
      flex: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      gap: 20px;
      box-sizing: border-box;
    }

    @media (max-width: 900px) {
      .app {
        flex-direction: column;
        padding: 16px;
      }
    }

    .sidebar {
      width: var(--sidebar-width);
      min-width: 220px;
      background: #ffffff;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      padding: 16px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .sidebar-title {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #71717a;
    }

    .sidebar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #ffffff;
      transition: background 0.15s ease, transform 0.1s ease,
        box-shadow 0.15s ease;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
    }

    .btn:hover {
      background: #4338ca;
      transform: translateY(-1px);
    }

    .btn.secondary {
      background: transparent;
      color: #4b5563;
      border: 1px solid var(--border);
      box-shadow: none;
    }

    body.dark .btn.secondary {
      color: #e5e7eb;
      border-color: #3f3f46;
    }

    .btn.secondary:hover {
      background: var(--accent-soft);
    }

    body.dark .btn.secondary:hover {
      background: #27272a;
    }

    .btn.icon {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.8rem;
    }

    .toc-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 60vh;
      overflow-y: auto;
    }

    .toc-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      border: 1px solid transparent;
      transition: background 0.12s ease, border-color 0.12s ease,
        transform 0.08s ease;
    }

    .toc-item:hover {
      background: #f4f4f5;
      border-color: var(--border);
      transform: translateY(-0.5px);
    }

    body.dark .toc-item:hover {
      background: #18181b;
      border-color: #27272a;
    }

    .toc-item.active {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    body.dark .toc-item.active {
      background: #1d1d20;
      border-color: var(--accent);
    }

    .toc-title {
      flex: 1;
      margin-right: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toc-meta {
      font-size: 0.7rem;
      color: #9ca3af;
      white-space: nowrap;
    }

    .toc-delete {
      border: none;
      background: transparent;
      color: var(--danger);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0 4px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title-input {
      flex: 1;
      min-width: 200px;
    }

    .label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .input {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-size: 0.95rem;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease,
        background 0.15s ease;
      background: #ffffff;
    }

    .input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-soft);
      background: #f9fafb;
    }

    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .switch {
      position: relative;
      width: 40px;
      height: 20px;
      border-radius: 999px;
      background: #e5e7eb;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .switch-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
      transition: transform 0.15s ease;
    }

    body.dark .switch {
      background: #4b5563;
    }

    body.dark .switch-thumb {
      transform: translateX(20px);
    }

    .card {
      background: #ffffff;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      padding: 12px;
      box-sizing: border-box;
    }

    .editor {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 260px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-size: 0.95rem;
      box-sizing: border-box;
      outline: none;
      line-height: 1.5;
      background: #ffffff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease,
        background 0.15s ease;
    }

    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: #f9fafb;
      font-size: 0.8rem;
    }

    .stat {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .stat-label {
      color: #6b7280;
    }

    .stat-value {
      font-weight: 600;
      color: #111827;
    }

    body.dark .stat-value {
      color: #e5e7eb;
    }

    .bottom-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .alt-render {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .alt-select {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 0.8rem;
      cursor: pointer;
    }

    body.dark .alt-select {
      background: #09090b;
      border-color: #27272a;
      color: #e5e7eb;
    }

    .export-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .export-row small {
      font-size: 0.75rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Step 5: Table of Contents / Document hierarchy -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Documents</div>
        <div class="sidebar-actions">
          <button class="btn icon" id="newDocBtn">+ New</button>
        </div>
      </div>
      <ul class="toc-list" id="tocList"></ul>
      <button class="btn secondary" id="backupJsonBtn">
        ⬇ Export all as JSON
      </button>
    </aside>

    <!-- Main writing area -->
    <main class="main">
      <div class="top-row">
        <div class="title-input">
          <div class="label">Title</div>
          <input
            type="text"
            id="titleInput"
            class="input"
            placeholder="Untitled document"
          />
        </div>
        <div class="mode-toggle">
          <span>Light</span>
          <div class="switch" id="themeSwitch">
            <div class="switch-thumb"></div>
          </div>
          <span>Dark</span>
        </div>
      </div>

      <section class="card editor">
        <div class="label">Writing canvas</div>
        <textarea
          id="editor"
          placeholder="Start writing your narrative..."
        ></textarea>

        <!-- Step 3: Analytics metrics -->
        <div class="stats-row">
          <div class="stat">
            <span class="stat-label">Words:</span>
            <span class="stat-value" id="wordCount">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Characters:</span>
            <span class="stat-value" id="charCount">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Density (chars/word):</span>
            <span class="stat-value" id="density">0</span>
          </div>
        </div>

        <div class="bottom-row">
          <!-- Step 4: Alternate text rendering selection -->
          <div class="alt-render">
            <span>Alternate view:</span>
            <select id="altRenderSelect" class="alt-select">
              <option value="raw">Raw text</option>
              <option value="uppercase">Uppercase</option>
              <option value="lowercase">Lowercase</option>
              <option value="sentence">Sentence case</option>
            </select>
          </div>

          <!-- Step 2 & 6: Local file generation + data portability -->
          <div class="export-row">
            <button class="btn secondary" id="downloadTxtBtn">
              ⬇ Download .txt
            </button>
            <small>Exports current document only</small>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // --- State & helpers ---
    const STORAGE_KEY = "narrativeDocuments_v1";
    let documents = [];
    let activeId = null;

    const titleInput = document.getElementById("titleInput");
    const editor = document.getElementById("editor");
    const wordCountEl = document.getElementById("wordCount");
    const charCountEl = document.getElementById("charCount");
    const densityEl = document.getElementById("density");
    const tocList = document.getElementById("tocList");
    const newDocBtn = document.getElementById("newDocBtn");
    const downloadTxtBtn = document.getElementById("downloadTxtBtn");
    const backupJsonBtn = document.getElementById("backupJsonBtn");
    const themeSwitch = document.getElementById("themeSwitch");
    const altRenderSelect = document.getElementById("altRenderSelect");

    function loadFromStorage() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        documents = [];
        createNewDocument();
        return;
      }
      try {
        documents = JSON.parse(raw) || [];
      } catch {
        documents = [];
      }
      if (documents.length === 0) {
        createNewDocument();
      } else {
        activeId = documents[0].id;
        renderActiveDocument();
      }
      renderToc();
    }

    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(documents));
    }

    function createNewDocument() {
      const id = Date.now().toString();
      const doc = {
        id,
        title: "Untitled document",
        content: "",
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      };
      documents.unshift(doc);
      activeId = id;
      renderToc();
      renderActiveDocument();
      saveToStorage();
    }

    function deleteDocument(id) {
      const idx = documents.findIndex((d) => d.id === id);
      if (idx === -1) return;
      documents.splice(idx, 1);
      if (documents.length === 0) {
        createNewDocument();
      } else {
        activeId = documents[0].id;
        renderActiveDocument();
      }
      renderToc();
      saveToStorage();
    }

    function setActiveDocument(id) {
      activeId = id;
      renderActiveDocument();
      renderToc();
    }

    function getActiveDocument() {
      return documents.find((d) => d.id === activeId) || null;
    }

    function renderToc() {
      tocList.innerHTML = "";
      documents.forEach((doc) => {
        const li = document.createElement("li");
        li.className = "toc-item" + (doc.id === activeId ? " active" : "");
        li.dataset.id = doc.id;

        const titleSpan = document.createElement("span");
        titleSpan.className = "toc-title";
        titleSpan.textContent = doc.title || "Untitled";

        const metaSpan = document.createElement("span");
        metaSpan.className = "toc-meta";
        const words = doc.content.trim()
          ? doc.content.trim().split(/\s+/).length
          : 0;
        metaSpan.textContent = `${words}w`;

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "toc-delete";
        deleteBtn.textContent = "✕";
        deleteBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteDocument(doc.id);
        });

        li.appendChild(titleSpan);
        li.appendChild(metaSpan);
        li.appendChild(deleteBtn);

        li.addEventListener("click", () => setActiveDocument(doc.id));

        tocList.appendChild(li);
      });
    }

    function renderActiveDocument() {
      const doc = getActiveDocument();
      if (!doc) return;
      titleInput.value = doc.title || "";
      editor.value = doc.content || "";
      updateStats(doc.content || "");
      applyAltRendering();
    }

    // --- Analytics (Step 3) ---
    function updateStats(text) {
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      const chars = text.length;
      const density = words > 0 ? (chars / words).toFixed(2) : 0;

      wordCountEl.textContent = words;
      charCountEl.textContent = chars;
      densityEl.textContent = density;
    }

    // --- Auto-save (Step 4) ---
    function syncActiveDocument() {
      const doc = getActiveDocument();
      if (!doc) return;
      doc.title = titleInput.value || "Untitled document";
      doc.content = editor.value;
      doc.updatedAt = new Date().toISOString();
      saveToStorage();
      renderToc();
    }

    // --- Alternate rendering (Step 4) ---
    function transformText(text, mode) {
      switch (mode) {
        case "uppercase":
          return text.toUpperCase();
        case "lowercase":
          return text.toLowerCase();
        case "sentence":
          return text
            .toLowerCase()
            .replace(/(^\s*\w|[.!?]\s*\w)/g, (m) => m.toUpperCase());
        default:
          return text;
      }
    }

    function applyAltRendering() {
      const doc = getActiveDocument();
      if (!doc) return;
      const mode = altRenderSelect.value;
      const caretPos = editor.selectionStart;
      const scrollTop = editor.scrollTop;
      const transformed = transformText(doc.content || "", mode);
      editor.value = transformed;
      updateStats(transformed);
      editor.selectionStart = editor.selectionEnd = caretPos;
      editor.scrollTop = scrollTop;
    }

    // --- Local file generation (Step 2) ---
    function downloadTxt() {
      const doc = getActiveDocument();
      if (!doc) return;
      const blob = new Blob([doc.content || ""], {
        type: "text/plain;charset=utf-8",
      });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const safeTitle = (doc.title || "document").replace(/[^\w\-]+/g, "_");
      a.href = url;
      a.download = safeTitle + ".txt";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // --- Bulk backup JSON (Step 6) ---
    function downloadJsonBackup() {
      const blob = new Blob([JSON.stringify(documents, null, 2)], {
        type: "application/json;charset=utf-8",
      });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "narrative_matrix.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // --- Theme toggle (Step 4 & 6) ---
    function toggleTheme() {
      document.body.classList.toggle("dark");
    }

    // --- Event wiring ---
    titleInput.addEventListener("input", () => {
      syncActiveDocument();
    });

    editor.addEventListener("input", () => {
      updateStats(editor.value);
      syncActiveDocument();
    });

    altRenderSelect.addEventListener("change", () => {
      applyAltRendering();
    });

    newDocBtn.addEventListener("click", () => {
      createNewDocument();
    });

    downloadTxtBtn.addEventListener("click", () => {
      downloadTxt();
    });

    backupJsonBtn.addEventListener("click", () => {
      downloadJsonBackup();
    });

    themeSwitch.addEventListener("click", () => {
      toggleTheme();
    });

    // --- Init ---
    loadFromStorage();
  </script>
</body>
</html>
